<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Work Tracker XL - Local File DB</title>
    <style>
        :root { --primary: #2563eb; --tax: #e11d48; --success: #059669; --bg: #f8fafc; --warn: #f59e0b; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: #0f172a; -webkit-tap-highlight-color: transparent; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Database Overlay */
        #dbOverlay { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .db-title { color: white; font-size: 28px; font-weight: 900; margin-bottom: 10px; }
        .db-text { color: #94a3b8; font-size: 16px; margin-bottom: 30px; max-width: 300px; }
        .db-btn { width: 100%; max-width: 300px; padding: 20px; border-radius: 16px; font-weight: 800; font-size: 18px; border: none; cursor: pointer; margin-bottom: 15px; }
        .db-btn-primary { background: var(--primary); color: white; }
        .db-btn-outline { background: transparent; border: 2px solid var(--primary); color: white; }

        .header-section { padding: 15px; background: white; border-bottom: 3px solid #e2e8f0; z-index: 100; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .xl-timeframe { font-size: 38px; font-weight: 900; color: var(--primary); display: block; line-height: 1.1; letter-spacing: -1px; margin: 5px 0; text-align: center; }
        .sub-timeframe { font-size: 20px; font-weight: 800; color: #64748b; display: block; margin-bottom: 10px; text-align: center; min-height: 24px; }
        .amount-row { display: flex; justify-content: space-between; align-items: flex-end; padding-top: 10px; border-top: 1px solid #f1f5f9; }
        .stat-value { font-size: 24px; font-weight: 800; color: #334155; }
        .net-total { font-size: 28px; color: var(--success); }
        .stat-label { font-size: 11px; text-transform: uppercase; font-weight: 700; color: #94a3b8; }
        .nav-controls { display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { background: #eff6ff; border: none; border-radius: 12px; width: 50px; height: 50px; cursor: pointer; font-size: 24px; color: var(--primary); display: flex; align-items: center; justify-content: center; }
        .main-scroll { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .card { background: white; padding: 15px; border-radius: 18px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .input-row { display: flex; gap: 8px; margin-bottom: 12px; position: relative; }
        .input-row > div { flex: 1; }
        label { display: block; font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 4px; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #cbd5e1; font-size: 16px; background: white; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 20px; border: none; border-radius: 16px; font-weight: 800; font-size: 18px; text-transform: uppercase; cursor: pointer; margin-bottom: 15px; }
        .start-btn { background: var(--success); color: white; }
        .stop-btn { background: var(--tax); color: white; }
        .save-btn { background: var(--primary); color: white; }
        .del-btn { background: #fee2e2; color: #b91c1c; border: 2px solid #fecaca; padding: 12px; border-radius: 12px; font-weight: 800; margin-bottom: 10px; width: 100%; display: none; }
        .shift-table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; margin-bottom: 40px; }
        .shift-row td { padding: 15px 10px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
        .pay-text { font-size: 18px; font-weight: 900; text-align: right; }
    </style>
</head>
<body>

<div id="dbOverlay">
    <div class="db-title">Database Setup</div>
    <div class="db-text">Connect a local file to save your data directly to your device storage.</div>
    <button class="db-btn db-btn-primary" onclick="initNewDB()">+ Create New File</button>
    <button class="db-btn db-btn-outline" onclick="initExistingDB()">📂 Open Existing File</button>
</div>

<div class="header-section">
    <div class="nav-controls">
        <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
        <span class="xl-timeframe" id="xlMonth">...</span>
        <button class="nav-btn" onclick="changeMonth(1)">❯</button>
    </div>
    <div class="amount-row">
        <div><span class="stat-label">Monthly Gross</span><br><span class="stat-value" id="monthGross">£0.00</span></div>
    </div>
    <div style="margin-top:15px;">
        <div class="nav-controls">
            <button class="nav-btn" onclick="changeWeek(-1)">❮</button>
            <span class="sub-timeframe" id="xlWeek">...</span>
            <button class="nav-btn" onclick="changeWeek(1)">❯</button>
        </div>
        <div class="amount-row">
            <div><span class="stat-label">Weekly Gross</span><br><span class="stat-value" id="weekGross">£0.00</span></div>
            <div style="text-align: right;"><span class="stat-label">Weekly Net</span><br><span class="stat-value net-total" id="weekNet">£0.00</span></div>
        </div>
    </div>
</div>

<div class="main-scroll">
    <div id="liveArea" class="card" style="display:none; background:#fffbeb; border:3px solid var(--warn);">
        <span style="font-weight:900; color:var(--tax); display:block; text-align:center;">🔴 LIVE RECORDING</span>
        <div class="input-row" style="margin-top:10px;"><input type="text" id="liveEmp" placeholder="Employer Name"></div>
        <div class="input-row">
            <div><label>Tax Code</label><select id="liveTax"><option value="1255L">1255L</option><option value="BR">BR</option></select></div>
        </div>
    </div>

    <button id="startBtn" class="btn-action start-btn" onclick="startShift()">Start Shift</button>
    <button id="endBtn" class="btn-action stop-btn" onclick="endShift()" style="display:none;">End & Save</button>

    <div class="card" id="formBox">
        <input type="hidden" id="editIdx" value="-1">
        <button id="inlineDel" class="del-btn" onclick="deleteCurrent()">DELETE THIS ENTRY</button>
        <div class="input-row"><input type="text" id="emp" placeholder="Employer Name"></div>
        <div class="input-row">
            <div><label>Date</label><input type="date" id="date"></div>
            <div><label>Tax</label><select id="tax"><option value="1255L">1255L</option><option value="BR">BR</option></select></div>
        </div>
        <div class="input-row">
            <div><label>Start</label><input type="time" id="sTime"></div>
            <div><label>End</label><input type="time" id="eTime"></div>
        </div>
        <div class="input-row">
            <div><label>Rate</label><input type="number" id="rate" value="17.62" step="0.01"></div>
            <div><label>Break (m)</label><input type="number" id="brk" value="0"></div>
        </div>
        <button class="btn-action save-btn" id="saveBtn" onclick="saveFromForm()">Save Record</button>
    </div>

    <input type="text" id="search" style="width:100%; padding:14px; border-radius:12px; border:2px solid var(--primary); margin-bottom:15px; box-sizing:border-box;" placeholder="🔍 Search..." onkeyup="render()">
    <table class="shift-table"><tbody id="shiftBody"></tbody></table>
</div>

<script>
    let shifts = [];
    let active = null;
    let fileHandle = null;
    
    let vDate = new Date();
    let vMonth = new Date();
    const M_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const F_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    // --- FILE SYSTEM LOGIC ---
    async function initNewDB() {
        try {
            fileHandle = await window.showSaveFilePicker({
                suggestedName: 'work_database.json',
                types: [{ description: 'JSON Database', accept: {'application/json': ['.json']} }]
            });
            await writeToDB();
            document.getElementById('dbOverlay').style.display = 'none';
        } catch (err) { alert("Action cancelled or not supported on this browser."); }
    }

    async function initExistingDB() {
        try {
            [fileHandle] = await window.showOpenFilePicker({
                types: [{ description: 'JSON Database', accept: {'application/json': ['.json']} }]
            });
            await readFromDB();
            document.getElementById('dbOverlay').style.display = 'none';
        } catch (err) { alert("Action cancelled or not supported on this browser."); }
    }

    async function writeToDB() {
        if (!fileHandle) return;
        try {
            const writable = await fileHandle.createWritable();
            await writable.write(JSON.stringify({ shifts: shifts, active: active }));
            await writable.close();
        } catch (err) { alert("Error saving to file: " + err.message); }
    }

    async function readFromDB() {
        if (!fileHandle) return;
        try {
            const file = await fileHandle.getFile();
            const text = await file.text();
            if (text) {
                const data = JSON.parse(text);
                shifts = data.shifts || [];
                active = data.active || null;
            }
            render();
            updateUI();
        } catch (err) { alert("Error reading file: " + err.message); }
    }

    // --- APP LOGIC ---
    function snapToQuarter(t) {
        if (!t) return "";
        let [h, m] = t.split(':').map(Number);
        if (m > 45) { m = 0; h = (h + 1) % 24; }
        else if (m > 30) m = 45; else if (m > 15) m = 30; else if (m > 0) m = 15;
        return h.toString().padStart(2, '0') + ":" + m.toString().padStart(2, '0');
    }

    async function startShift() {
        active = { 
            start: snapToQuarter(new Date().toTimeString().slice(0,5)), 
            date: new Date().toISOString().split('T')[0], 
            trueStart: Date.now() 
        };
        await writeToDB();
        updateUI();
    }

    async function endShift() {
        await saveData({
            employer: document.getElementById('liveEmp').value || 'Work',
            date: active.date,
            taxCode: document.getElementById('liveTax').value,
            start: active.start,
            end: snapToQuarter(new Date().toTimeString().slice(0,5)),
            rate: 17.62,
            break: 0,
            timestamp: Date.now()
        });
        active = null; 
        await writeToDB();
        updateUI();
    }

    async function saveData(obj) {
        let [sH, sM] = obj.start.split(':').map(Number), [eH, eM] = obj.end.split(':').map(Number);
        let sTotal = sH * 60 + sM, eTotal = eH * 60 + eM;
        if (eTotal <= sTotal) eTotal += 1440;
        obj.hours = (((eTotal - sTotal) - parseInt(obj.break)) / 60).toFixed(2);
        obj.pay = (obj.hours * obj.rate).toFixed(2);
        
        const idx = parseInt(document.getElementById('editIdx').value);
        if(idx > -1) shifts[idx] = obj; else shifts.push(obj);
        
        await writeToDB();
        resetForm(); 
        render();
    }

    async function saveFromForm() {
        await saveData({
            employer: document.getElementById('emp').value || 'Work',
            date: document.getElementById('date').value,
            taxCode: document.getElementById('tax').value,
            start: document.getElementById('sTime').value,
            end: document.getElementById('eTime').value,
            rate: document.getElementById('rate').value,
            break: document.getElementById('brk').value,
            timestamp: Date.now()
        });
    }

    async function deleteCurrent() {
        const idx = parseInt(document.getElementById('editIdx').value);
        if(idx > -1 && confirm("Delete this shift permanently?")) {
            shifts.splice(idx, 1);
            await writeToDB();
            resetForm(); 
            render();
        }
    }

    function render() {
        const d = new Date(vDate);
        d.setHours(0,0,0,0);
        const dayNum = d.getDay();
        const offset = (dayNum === 0 ? -6 : 1 - dayNum);
        const mon = new Date(d); mon.setDate(d.getDate() + offset);
        const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
        
        document.getElementById('xlWeek').innerText = mon.getDate() + " " + M_NAMES[mon.getMonth()] + " - " + sun.getDate() + " " + M_NAMES[sun.getMonth()];
        document.getElementById('xlMonth').innerText = F_NAMES[vMonth.getMonth()];

        let wG = 0, mG = 0, w1255 = 0, wBR = 0;
        const body = document.getElementById('shiftBody');
        const search = document.getElementById('search').value.toLowerCase();
        body.innerHTML = '';
        
        const targetMonth = vMonth.getMonth();
        const targetYear = vMonth.getFullYear();

        shifts.sort((a,b) => new Date(b.date) - new Date(a.date));

        shifts.forEach((s, i) => {
            const sDate = new Date(s.date);
            const p = parseFloat(s.pay);
            if (sDate.getMonth() === targetMonth && sDate.getFullYear() === targetYear) mG += p;
            if (sDate.getTime() >= mon.getTime() && sDate.getTime() <= sun.setHours(23,59,59,999)) {
                wG += p;
                s.taxCode === '1255L' ? w1255 += p : wBR += p;
            }
            if (s.employer.toLowerCase().includes(search)) {
                body.innerHTML += `<tr onclick="editRow(${i})" class="shift-row"><td><b>${s.employer}</b><br><small>${s.date.split('-').reverse().join('/')} (${s.start}-${s.end}) • ${s.hours}h</small></td><td class="pay-text">£${s.pay}</td></tr>`;
            }
        });
        
        let t1 = Math.max(0, w1255 - 241.35) * 0.28, t2 = wBR * 0.28;
        document.getElementById('weekGross').innerText = "£" + wG.toFixed(2);
        document.getElementById('monthGross').innerText = "£" + mG.toFixed(2);
        document.getElementById('weekNet').innerText = "£" + (wG - (t1 + t2)).toFixed(2);
    }

    function updateUI() {
        const area = document.getElementById('liveArea'), sB = document.getElementById('startBtn'), eB = document.getElementById('endBtn');
        if (active) { area.style.display = 'block'; sB.style.display = 'none'; eB.style.display = 'block'; }
        else { area.style.display = 'none'; sB.style.display = 'block'; eB.style.display = 'none'; }
    }

    function changeMonth(n) { vMonth.setMonth(vMonth.getMonth() + n); render(); }
    function changeWeek(n) { vDate.setDate(vDate.getDate() + (n * 7)); render(); }
    
    function editRow(i) {
        const s = shifts[i]; 
        document.getElementById('editIdx').value = i; 
        document.getElementById('emp').value = s.employer;
        document.getElementById('date').value = s.date; 
        document.getElementById('tax').value = s.taxCode || "1255L";
        document.getElementById('sTime').value = s.start; 
        document.getElementById('eTime').value = s.end;
        document.getElementById('rate').value = s.rate; 
        document.getElementById('brk').value = s.break;
        document.getElementById('saveBtn').innerText = "Update Entry";
        document.getElementById('inlineDel').style.display = "block";
        document.querySelector('.main-scroll').scrollTo(0,0);
    }

    function resetForm() { 
        document.getElementById('editIdx').value = -1; 
        document.getElementById('emp').value = ''; 
        document.getElementById('saveBtn').innerText = "Save Record"; 
        document.getElementById('inlineDel').style.display = "none";
    }

    document.getElementById('date').valueAsDate = new Date();
</script>
</body>
</html>
